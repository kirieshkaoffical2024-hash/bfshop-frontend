<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - BFshop</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title">🎮 BFshop</h1>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <h2>Вход</h2>
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
                <p class="auth-switch">
                    Нет аккаунта? <a href="#" id="showRegister">Регистрация</a>
                </p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" style="display: none;">
                <h2>Регистрация</h2>
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="registerUsername" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Email (необязательно)</label>
                    <input type="email" id="registerEmail">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Подтвердите пароль</label>
                    <input type="password" id="registerConfirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
                <p class="auth-switch">
                    Уже есть аккаунт? <a href="#" id="showLogin">Войти</a>
                </p>
            </form>

            <div class="auth-message" id="authMessage"></div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
